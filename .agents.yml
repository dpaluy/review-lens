# .agents.yml - Project configuration for agent runtime commands
# Generated by majestic-init

config_version: 1.9
default_branch: master
app_status: development

# Owner Context - Tailors skill outputs to experience level
owner:
  level: expert
  rails: senior

# Tech Stack
tech_stack: rails
ruby_version: "4.0.5"
rails_version: "8.1.3"
database: postgres
frontend: hotwire
css: tailwind
assets: propshaft
js: importmap
deployment: kamal
extras:
  - solid_cache
  - solid_queue
  - solid_cable

# Workflow
task_management: github
workflow_labels:
  - backlog
  - in-progress
  - ready-for-review
  - done
workflow: worktrees
branch_naming: feature/desc
lessons_path: .agents/lessons/

# Auto-preview markdown files (plans, PRDs, briefs, handoffs)
auto_preview: true

# Blueprint
blueprint:
  auto_create_task: true

# Session - Continuity crash recovery
session:
  ledger: true
  ledger_path: .agents/session_ledger.md

# Quality Gate - Reviewers run during quality checks
quality_gate:
  reviewers:
    - security-review
    - dhh-code-reviewer
    - performance-reviewer
    - test-reviewer
